kind = "web"
previewPath = "/"
title = "AI-Solutions"
version = "1.0.0"
id = "artifacts/ai-solutions"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21069

[services.development]
run = "pnpm --filter @workspace/ai-solutions run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-solutions", "run", "build" ]
publicDir = "artifacts/ai-solutions/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21069"
BASE_PATH = "/"
